<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4">
                <h3 class="text-center mb-4">Criar Conta</h3>

                <!-- 🔥 ERROS DO FORM -->
                {% if form.errors %}
                    <div class="alert alert-danger">
                        {{ form.errors }}
                    </div>
                {% endif %}

                <!-- 🔥 MESSAGES -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Usuário</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        {{ form.password1 }}
                    </div>

                    <div class="mb-3">
                        <label>Confirmar Senha</label>
                        {{ form.password2 }}
                    </div>

                    <button class="btn btn-success w-100">Cadastrar</button>
                </form>

                <hr>
                <p class="text-center">
                    Já tem conta? <a href="{% url 'login' %}">Login</a>
                </p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
