{% extends 'eventos/base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Confirmar Exclusão</h4>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5">Tem certeza que deseja excluir o ingresso:</p>
                    <h4 class="text-danger">"{{ ingresso.get_tipo_display }}"</h4>
                    <p class="text-muted">do evento: {{ ingresso.evento.titulo }}</p>
                    <p class="text-muted">Esta ação não pode ser desfeita!</p>
                    
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-1"></i> Sim, Excluir
                            </button>
                            <a href="{% url 'editar_evento' ingresso.evento.id %}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
