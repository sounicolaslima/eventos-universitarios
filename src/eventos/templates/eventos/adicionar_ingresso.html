{% extends 'eventos/base.html' %}
{% load static %}

{% block content %}

<div style="
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div style="
                    background: white;
                    border-radius: 24px;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
                    overflow: hidden;
                ">

                    <!-- Header -->
                    <div style="
                        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
                        padding: 28px 32px;
                    ">
                        <h4 style="color: white; font-weight: 700; margin: 0;">
                            <i class="fas fa-plus-circle me-2"></i> Adicionar Ingresso
                        </h4>
                        <p style="color: rgba(255,255,255,0.5); margin: 4px 0 0; font-size: 0.9rem;">
                            Cadastre um novo tipo de ingresso
                        </p>
                    </div>

                    <div style="padding: 28px 32px;">

                        <!-- Nome do evento -->
                        <div style="
                            background: #f8fafc;
                            border-radius: 12px;
                            padding: 12px 16px;
                            margin-bottom: 20px;
                            border: 1px solid #f1f3f5;
                            display: flex;
                            align-items: center;
                            gap: 10px;
                        ">
                            <i class="fas fa-calendar-alt" style="color: #6366f1; font-size: 1.1rem;"></i>
                            <span style="font-weight: 600; color: #1a1a2e;">Evento:</span>
                            <span style="color: #4b5563;">{{ evento.titulo }}</span>
                        </div>

                        <form method="post" action="{% url 'adicionar_ingresso' evento.id %}">
                            {% csrf_token %}
                            
                            <!-- Tipo de Ingresso -->
                            <div style="margin-bottom: 20px;">
                                <label style="font-weight: 600; color: #1a1a2e; font-size: 0.9rem; margin-bottom: 6px; display: block;" for="adicionar_ingresso_tipo">
                                    <i class="fas fa-ticket-alt me-2" style="color: #6366f1;"></i> Tipo de Ingresso *
                                </label>
                                <select name="tipo" class="form-select" required style="
                                    padding: 12px 16px;
                                    border-radius: 12px;
                                    border: 2px solid #e5e7eb;
                                    font-size: 1rem;
                                    transition: all 0.3s ease;
                                    background: #fafbfc;
                                    cursor: pointer;
                                " onfocus="this.style.borderColor='#6366f1'; this.style.boxShadow='0 0 0 4px rgba(99,102,241,0.1)'" onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none'" id="adicionar_ingresso_tipo" aria-label="Tipo de Ingresso">
                                    <option value="">Selecione...</option>
                                    <option value="inteira">🎫 Inteira</option>
                                    <option value="meia">🎟️ Meia-entrada</option>
                                    <option value="vip">👑 VIP</option>
                                </select>
                            </div>
                            
                            <!-- Preço -->
                            <div style="margin-bottom: 20px;">
                                <label style="font-weight: 600; color: #1a1a2e; font-size: 0.9rem; margin-bottom: 6px; display: block;" for="adicionar_ingresso_preco">
                                    <i class="fas fa-dollar-sign me-2" style="color: #6366f1;"></i> Preço (R$) *
                                </label>
                                <input type="number" step="0.01" name="preco" class="form-control" placeholder="Ex: 25.00" required style="
                                    padding: 12px 16px;
                                    border-radius: 12px;
                                    border: 2px solid #e5e7eb;
                                    font-size: 1rem;
                                    transition: all 0.3s ease;
                                    background: #fafbfc;
                                " onfocus="this.style.borderColor='#6366f1'; this.style.boxShadow='0 0 0 4px rgba(99,102,241,0.1)'; this.style.background='white'" onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none'; this.style.background='#fafbfc'" id="adicionar_ingresso_preco" aria-label="Preço (R$)">
                            </div>
                            
                            <!-- Quantidade -->
                            <div style="margin-bottom: 24px;">
                                <label style="font-weight: 600; color: #1a1a2e; font-size: 0.9rem; margin-bottom: 6px; display: block;" for="adicionar_ingresso_quantidade">
                                    <i class="fas fa-hashtag me-2" style="color: #6366f1;"></i> Quantidade Disponível *
                                </label>
                                <input type="number" name="quantidade" class="form-control" placeholder="Ex: 100" required style="
                                    padding: 12px 16px;
                                    border-radius: 12px;
                                    border: 2px solid #e5e7eb;
                                    font-size: 1rem;
                                    transition: all 0.3s ease;
                                    background: #fafbfc;
                                " onfocus="this.style.borderColor='#6366f1'; this.style.boxShadow='0 0 0 4px rgba(99,102,241,0.1)'; this.style.background='white'" onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none'; this.style.background='#fafbfc'" id="adicionar_ingresso_quantidade" aria-label="Quantidade Disponível">
                            </div>
                            
                            <!-- Dica -->
                            <div style="
                                background: #fffbeb;
                                border-radius: 12px;
                                padding: 14px 18px;
                                margin-bottom: 24px;
                                border: 1px solid #fde68a;
                                display: flex;
                                align-items: flex-start;
                                gap: 10px;
                            ">
                                <i class="fas fa-lightbulb" style="color: #f59e0b; font-size: 1.1rem; margin-top: 1px;"></i>
                                <div>
                                    <strong style="color: #92400e;">Dica:</strong>
                                    <span style="color: #92400e;">Você pode adicionar múltiplos ingressos para o mesmo evento (ex: Inteira, Meia, VIP).</span>
                                </div>
                            </div>
                            
                            <!-- Botões -->
                            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                                <button type="submit" style="
                                    padding: 12px 32px;
                                    background: linear-gradient(135deg, #10b981, #059669);
                                    color: white;
                                    border: none;
                                    border-radius: 12px;
                                    font-weight: 600;
                                    cursor: pointer;
                                    transition: all 0.3s ease;
                                    box-shadow: 0 4px 16px rgba(16,185,129,0.2);
                                " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(16,185,129,0.3)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 16px rgba(16,185,129,0.2)'" onfocus="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(16,185,129,0.3)'" onblur="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 16px rgba(16,185,129,0.2)'">
                                    <i class="fas fa-save me-2"></i> Adicionar Ingresso
                                </button>
                                <a href="{% url 'editar_evento' evento.id %}" style="
                                    display: inline-block;
                                    padding: 12px 32px;
                                    background: #f1f3f5;
                                    color: #4b5563;
                                    border-radius: 12px;
                                    font-weight: 600;
                                    text-decoration: none;
                                    transition: all 0.3s ease;
                                " onmouseover="this.style.background='#e5e7eb'" onmouseout="this.style.background='#f1f3f5'" onfocus="this.style.background='#e5e7eb'" onblur="this.style.background='#f1f3f5'">
                                    <i class="fas fa-arrow-left me-2"></i> Voltar
                                </button>
                            </div>
                        </form>

                    </div>

                </div>

            </div>
        </div>
    </div>

</div>

<style>
    .form-control:focus {
        outline: none;
    }
    .form-select:focus {
        outline: none;
    }
</style>

{% endblock %}
