{% extends 'eventos/base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Adicionar Ingresso</h4>
                </div>
                <div class="card-body">
                    <h5>Evento: {{ evento.titulo }}</h5>
                    <hr>
                    
                    <form method="post" action="{% url 'adicionar_ingresso' evento.id %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tipo de Ingresso *</label>
                            <select name="tipo" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option value="inteira">🎫 Inteira</option>
                                <option value="meia">🎟️ Meia-entrada</option>
                                <option value="vip">👑 VIP</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Preço (R$) *</label>
                            <input type="number" step="0.01" name="preco" class="form-control" placeholder="Ex: 25.00" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Quantidade Disponível *</label>
                            <input type="number" name="quantidade" class="form-control" placeholder="Ex: 100" required>
                        </div>
                        
                        <div class="alert alert-warning">
                            <i class="fas fa-lightbulb me-2"></i>
                            <strong>Dica:</strong> Você pode adicionar múltiplos ingressos para o mesmo evento (ex: Inteira, Meia, VIP).
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-1"></i> Adicionar Ingresso
                            </button>
                            <a href="{% url 'editar_evento' evento.id %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-1"></i> Voltar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
